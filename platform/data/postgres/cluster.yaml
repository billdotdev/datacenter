apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: datacenter-postgres
  namespace: database
spec:
  instances: 3
  affinity:
    enablePodAntiAffinity: true
    topologyKey: kubernetes.io/hostname
    podAntiAffinityType: required
  storage:
    size: 20Gi
    storageClass: local-path
  monitoring:
    enablePodMonitor: true
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  bootstrap:
    initdb:
      database: datacenter
      owner: datacenter
  managed:
    roles:
      - name: datacenter
        login: true
        superuser: false
  postgresql:
    parameters:
      max_connections: "200"
      shared_buffers: "256MB"
