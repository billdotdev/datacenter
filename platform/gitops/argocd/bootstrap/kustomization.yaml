apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: argocd
resources:
  - namespace.yaml
  - https://raw.githubusercontent.com/argoproj/argo-cd/stable/manifests/install.yaml
  - argocd-server-httproute.yaml
patches:
  - path: argocd-cmd-params-cm-server-insecure.yaml
    target:
      kind: ConfigMap
      name: argocd-cmd-params-cm
  - path: argocd-cm-application-health.yaml
    target:
      kind: ConfigMap
      name: argocd-cm
  - path: argocd-application-controller-resources.yaml
    target:
      kind: StatefulSet
      name: argocd-application-controller
  - path: argocd-repo-server-hardening.yaml
    target:
      kind: Deployment
      name: argocd-repo-server
  - path: argocd-server-resources.yaml
    target:
      kind: Deployment
      name: argocd-server
  - path: argocd-dex-server-resources.yaml
    target:
      kind: Deployment
      name: argocd-dex-server
  - path: argocd-redis-resources.yaml
    target:
      kind: Deployment
      name: argocd-redis
