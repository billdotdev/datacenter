apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: argocd
resources:
  - namespace.yaml
  - https://raw.githubusercontent.com/argoproj/argo-cd/stable/manifests/install.yaml
patches:
  - path: argocd-cm-application-health.yaml
    target:
      kind: ConfigMap
      name: argocd-cm
  - path: argocd-repo-server-hardening.yaml
    target:
      kind: Deployment
      name: argocd-repo-server
