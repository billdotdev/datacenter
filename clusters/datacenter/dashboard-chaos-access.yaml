apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: dashboard-chaos-runner
  namespace: chaos-mesh
rules:
  - apiGroups:
      - chaos-mesh.org
    resources:
      - podchaos
    verbs:
      - create
      - get
      - list
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: dashboard-chaos-runner
  namespace: chaos-mesh
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: dashboard-chaos-runner
subjects:
  - kind: ServiceAccount
    name: dashboard
    namespace: dashboard
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: dashboard-chaos-target-reader
  namespace: dashboard
rules:
  - apiGroups:
      - ""
    resources:
      - pods
      - namespaces
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - chaos-mesh.org
    resources:
      - '*'
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: dashboard-chaos-target-reader
  namespace: dashboard
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: dashboard-chaos-target-reader
subjects:
  - kind: ServiceAccount
    name: dashboard
    namespace: dashboard
