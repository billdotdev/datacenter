apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd-access
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  project: datacenter
  source:
    repoURL: https://github.com/billdotdev/datacenter.git
    targetRevision: main
    path: platform/gitops/argocd/access
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
