- name: Prepare all cluster nodes
  hosts: control_plane
  become: true
  tasks:
    - name: Disable swap immediately
      ansible.builtin.command: swapoff -a
      changed_when: false

    - name: Disable swap in fstab
      ansible.builtin.replace:
        path: /etc/fstab
        regexp: '^(.*\sswap\s+sw\s+.*)$'
        replace: '# \1'

    - name: Install base packages
      ansible.builtin.apt:
        name: "{{ common_packages }}"
        state: present
        update_cache: true
